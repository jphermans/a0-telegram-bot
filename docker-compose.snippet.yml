# Docker Compose snippet for A0 Telegram Bot
# Add this service to your existing docker-compose.yml
# IMPORTANT: Both containers must share the same volume for attachments to work

services:
  telegram-bot:
    build:
      context: ./a0-telegram-bot
      dockerfile: Dockerfile
    container_name: a0-telegram-bot
    restart: unless-stopped
    depends_on:
      - agent-zero
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS}
      - A0_ENDPOINT=http://agent-zero:80
      - A0_API_KEY=${A0_API_KEY}
      - A0_TIMEOUT=300
      - LOG_LEVEL=INFO
      - SHARED_VOLUME_PATH=/shared
    volumes:
      # Shared volume for file attachments - MUST match A0's volume mount
      - a0-shared:/shared
    networks:
      - default

# Add this volume if not already defined
volumes:
  a0-shared:
    driver: local
